<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${producto.nombre} + ' | Dulce Luna'"></title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>
<header class="encabezado">
    <a class="marca" th:href="@{/}">Dulce Luna</a>
    <nav>
        <a class="activo" th:href="@{/productos}">Productos</a>
        <a th:href="@{/categorias}">Categorías</a>
        <a th:href="@{/api/productos}" target="_blank">API</a>
    </nav>
</header>

<main class="contenedor contenedor-detalle">
    <a class="volver" th:href="@{/productos}">← Volver a productos</a>

    <article class="panel detalle-producto">
        <div class="detalle-cabecera">
            <div>
                <p class="etiqueta">Producto <span th:text="|#${producto.id}|"></span></p>
                <h1 th:text="${producto.nombre}"></h1>
                <p th:text="${producto.descripcion ?: 'Sin descripción'}"></p>
            </div>
            <span class="insignia"
                  th:classappend="${producto.disponible} ? ' disponible' : ' agotado'"
                  th:text="${producto.disponible} ? 'Disponible' : 'Agotado'">
            </span>
        </div>

        <dl class="datos-detalle">
            <div>
                <dt>Sabor</dt>
                <dd th:text="${producto.sabor}"></dd>
            </div>
            <div>
                <dt>Precio</dt>
                <dd th:text="|$${#numbers.formatDecimal(producto.precio, 1, 2)}|"></dd>
            </div>
            <div>
                <dt>Categoría relacionada</dt>
                <dd th:text="${producto.categoria.nombre}"></dd>
            </div>
            <div>
                <dt>ID de categoría</dt>
                <dd th:text="${producto.categoria.id}"></dd>
            </div>
        </dl>

        <div class="acciones-formulario">
            <a class="boton boton-primario" th:href="@{/productos/editar/{id}(id=${producto.id})}">Editar</a>
            <form th:action="@{/productos/eliminar/{id}(id=${producto.id})}"
                  method="post"
                  onsubmit="return confirm('¿Eliminar este producto?');">
                <button class="boton boton-peligro" type="submit">Eliminar</button>
            </form>
        </div>
    </article>
</main>
</body>
</html>
